name: Calidad y despliegue

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: calidad-pages-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  calidad:
    name: Verificar y construir
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Obtener el repositorio
        uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Configurar Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Instalar dependencias
        run: npm ci

      - name: Comprobar formato
        run: npm run format:check

      - name: Ejecutar análisis estático
        run: npm run lint

      - name: Ejecutar pruebas con cobertura
        run: npm run test:coverage

      - name: Construir la aplicación
        run: npm run build

      - name: Verificar el artefacto para GitHub Pages
        run: npm run verify:pages

      - name: Configurar GitHub Pages
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/configure-pages@v6

      - name: Empaquetar el sitio
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/upload-pages-artifact@v5
        with:
          path: dist

  desplegar:
    name: Publicar en GitHub Pages
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: calidad
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.despliegue.outputs.page_url }}
    steps:
      - name: Desplegar el sitio
        id: despliegue
        uses: actions/deploy-pages@v5
