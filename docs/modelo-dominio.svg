<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1180" viewBox="0 0 1600 1180" role="img" aria-labelledby="titulo descripcion">
  <title id="titulo">HereToPlan — Modelo de dominio implementado</title>
  <desc id="descripcion">Diagrama de entidades y relaciones entre actividades, contextos, planificación editable, compromisos históricos, puntos y recompensas.</desc>
  <defs>
    <filter id="sombra" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="4" stdDeviation="5" flood-color="#0f172a" flood-opacity="0.12"/>
    </filter>
    <marker id="flecha" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#475569"/>
    </marker>
    <marker id="triangulo" viewBox="0 0 12 12" refX="11" refY="6" markerWidth="10" markerHeight="10" orient="auto">
      <path d="M 1 1 L 11 6 L 1 11 z" fill="#ffffff" stroke="#475569" stroke-width="1.5"/>
    </marker>
    <marker id="diamante" viewBox="0 0 14 14" refX="13" refY="7" markerWidth="11" markerHeight="11" orient="auto">
      <path d="M 1 7 L 7 1 L 13 7 L 7 13 z" fill="#334155"/>
    </marker>
    <style>
      .fondo { fill: #f8fafc; }
      .titulo { font: 700 30px Inter, Segoe UI, sans-serif; fill: #0f172a; }
      .subtitulo { font: 400 16px Inter, Segoe UI, sans-serif; fill: #475569; }
      .grupo { fill: #ffffff; stroke: #cbd5e1; stroke-width: 1.5; rx: 18; filter: url(#sombra); }
      .grupo-titulo { font: 700 18px Inter, Segoe UI, sans-serif; fill: #0f172a; }
      .grupo-subtitulo { font: 400 13px Inter, Segoe UI, sans-serif; fill: #64748b; }
      .clase { fill: #ffffff; stroke-width: 2; rx: 10; }
      .actividad { stroke: #2563eb; }
      .planificacion { stroke: #059669; }
      .historia { stroke: #7c3aed; }
      .economia { stroke: #c2410c; }
      .cabecera-actividad { fill: #dbeafe; }
      .cabecera-planificacion { fill: #d1fae5; }
      .cabecera-historia { fill: #ede9fe; }
      .cabecera-economia { fill: #ffedd5; }
      .estereotipo { font: 600 11px Inter, Segoe UI, sans-serif; fill: #64748b; letter-spacing: 0.06em; }
      .nombre { font: 700 16px Inter, Segoe UI, sans-serif; fill: #0f172a; }
      .atributo { font: 400 12.5px ui-monospace, SFMono-Regular, Consolas, monospace; fill: #334155; }
      .regla { fill: #f1f5f9; stroke: #cbd5e1; stroke-width: 1.3; rx: 10; }
      .regla-titulo { font: 700 13px Inter, Segoe UI, sans-serif; fill: #0f172a; }
      .regla-texto { font: 400 12.5px Inter, Segoe UI, sans-serif; fill: #475569; }
      .relacion { fill: none; stroke: #475569; stroke-width: 1.8; marker-end: url(#flecha); }
      .herencia { fill: none; stroke: #475569; stroke-width: 1.8; marker-end: url(#triangulo); }
      .composicion { fill: none; stroke: #334155; stroke-width: 2; marker-start: url(#diamante); marker-end: url(#flecha); }
      .relacion-etiqueta { font: 600 12px Inter, Segoe UI, sans-serif; fill: #334155; paint-order: stroke; stroke: #f8fafc; stroke-width: 5px; stroke-linejoin: round; }
      .multiplicidad { font: 700 11px ui-monospace, SFMono-Regular, Consolas, monospace; fill: #64748b; paint-order: stroke; stroke: #f8fafc; stroke-width: 4px; }
      .leyenda { font: 400 12px Inter, Segoe UI, sans-serif; fill: #475569; }
    </style>
  </defs>

  <rect class="fondo" width="1600" height="1180"/>
  <text class="titulo" x="54" y="54">HereToPlan — Modelo de dominio implementado</text>
  <text class="subtitulo" x="54" y="82">Las agendas nombradas organizan; los bloques editables planifican; los compromisos confirmados conservan historia.</text>

  <rect class="grupo" x="40" y="112" width="455" height="620"/>
  <text class="grupo-titulo" x="64" y="143">Catálogo de actividades</text>
  <text class="grupo-subtitulo" x="64" y="164">Definiciones reutilizables, independientes del calendario</text>

  <g transform="translate(72 190)">
    <rect class="clase actividad" width="390" height="142"/>
    <path class="cabecera-actividad" d="M10 0 H380 A10 10 0 0 1 390 10 V49 H0 V10 A10 10 0 0 1 10 0"/>
    <text class="estereotipo" x="16" y="18">«ENTIDAD BASE»</text>
    <text class="nombre" x="16" y="40">Actividad</text>
    <text class="atributo" x="16" y="72">id: Identificador</text>
    <text class="atributo" x="16" y="92">titulo: string</text>
    <text class="atributo" x="16" y="112">tipo: TipoActividad</text>
    <text class="atributo" x="16" y="132">creadaEn: Date</text>
  </g>

  <g transform="translate(72 382)">
    <rect class="clase actividad" width="185" height="180"/>
    <path class="cabecera-actividad" d="M10 0 H175 A10 10 0 0 1 185 10 V49 H0 V10 A10 10 0 0 1 10 0"/>
    <text class="estereotipo" x="14" y="18">«ENTIDAD»</text>
    <text class="nombre" x="14" y="40">Tarea</text>
    <text class="atributo" x="14" y="72">tipo:</text>
    <text class="atributo" x="14" y="91">TAREA_SIMPLE</text>
    <text class="atributo" x="14" y="110">TAREA_COMPUESTA</text>
    <text class="atributo" x="14" y="129">PROYECTO</text>
    <text class="atributo" x="14" y="151">estado: EstadoTarea</text>
    <text class="atributo" x="14" y="170">subtareasIds: Set</text>
  </g>

  <g transform="translate(277 382)">
    <rect class="clase actividad" width="185" height="180"/>
    <path class="cabecera-actividad" d="M10 0 H175 A10 10 0 0 1 185 10 V49 H0 V10 A10 10 0 0 1 10 0"/>
    <text class="estereotipo" x="14" y="18">«ENTIDAD»</text>
    <text class="nombre" x="14" y="40">Habito</text>
    <text class="atributo" x="14" y="72">frecuencia:</text>
    <text class="atributo" x="14" y="91">DIARIA | SEMANAL</text>
    <text class="atributo" x="14" y="110">| PERSONALIZADA</text>
    <text class="atributo" x="14" y="134">diasSemana: Set</text>
    <text class="atributo" x="14" y="156">duracionMinutos:</text>
    <text class="atributo" x="14" y="174">number</text>
  </g>

  <path class="herencia" d="M164 382 V354 H207 V334"/>
  <path class="herencia" d="M370 382 V354 H327 V334"/>

  <rect class="regla" x="72" y="594" width="390" height="106"/>
  <text class="regla-titulo" x="90" y="620">Invariantes del catálogo</text>
  <text class="regla-texto" x="90" y="644">• Crear una actividad no crea una fecha ni un bloque.</text>
  <text class="regla-texto" x="90" y="666">• Compuestas y proyectos forman un grafo acíclico.</text>
  <text class="regla-texto" x="90" y="688">• Resolver subtareas no completa el contenedor.</text>

  <rect class="grupo" x="520" y="112" width="530" height="620"/>
  <text class="grupo-titulo" x="544" y="143">Planificación editable</text>
  <text class="grupo-subtitulo" x="544" y="164">Organización y asignaciones anteriores a la confirmación</text>

  <g transform="translate(555 190)">
    <rect class="clase planificacion" width="460" height="166"/>
    <path class="cabecera-planificacion" d="M10 0 H450 A10 10 0 0 1 460 10 V49 H0 V10 A10 10 0 0 1 10 0"/>
    <text class="estereotipo" x="16" y="18">«RAÍZ DE AGREGADO»</text>
    <text class="nombre" x="16" y="40">ContextoPlanificacion</text>
    <text class="atributo" x="16" y="72">id: Identificador</text>
    <text class="atributo" x="16" y="92">tipo: LIBRE | NOMBRADO</text>
    <text class="atributo" x="16" y="112">nombre: string · proposito: string?</text>
    <text class="atributo" x="16" y="132">fechaInicio / fechaFin: FechaLocal?</text>
    <text class="atributo" x="16" y="152">eliminable: boolean «derivado»</text>
  </g>

  <g transform="translate(555 410)">
    <rect class="clase planificacion" width="460" height="188"/>
    <path class="cabecera-planificacion" d="M10 0 H450 A10 10 0 0 1 460 10 V49 H0 V10 A10 10 0 0 1 10 0"/>
    <text class="estereotipo" x="16" y="18">«ENTIDAD EDITABLE»</text>
    <text class="nombre" x="16" y="40">BloquePlanificacion</text>
    <text class="atributo" x="16" y="72">id: Identificador</text>
    <text class="atributo" x="16" y="92">actividadId / contextoId: Identificador</text>
    <text class="atributo" x="16" y="112">fecha: FechaLocal</text>
    <text class="atributo" x="16" y="132">minutosPlanificados: number</text>
    <text class="atributo" x="16" y="152">politica: PoliticaCompromiso «instantánea»</text>
    <text class="atributo" x="16" y="172">creadoEn: Date</text>
  </g>

  <g transform="translate(555 630)">
    <rect class="clase planificacion" width="460" height="74"/>
    <path class="cabecera-planificacion" d="M10 0 H450 A10 10 0 0 1 460 10 V34 H0 V10 A10 10 0 0 1 10 0"/>
    <text class="estereotipo" x="16" y="21">«OBJETO DE VALOR»</text>
    <text class="nombre" x="16" y="56">PoliticaCompromiso · rigidez · autoridad · ajustes</text>
  </g>

  <path class="relacion" d="M785 408 V358"/>
  <text class="relacion-etiqueta" x="800" y="389">pertenece a</text>
  <text class="multiplicidad" x="794" y="373">1</text>
  <text class="multiplicidad" x="794" y="405">0..*</text>
  <path class="relacion" d="M785 598 V628"/>
  <text class="relacion-etiqueta" x="800" y="619">aplica 1</text>

  <path class="relacion" d="M553 504 H520 V286 H464"/>
  <text class="relacion-etiqueta" x="470" y="483">referencia</text>
  <text class="multiplicidad" x="478" y="276">1</text>
  <text class="multiplicidad" x="530" y="496">0..*</text>

  <rect class="grupo" x="1075" y="112" width="485" height="620"/>
  <text class="grupo-titulo" x="1099" y="143">Compromisos e historia</text>
  <text class="grupo-subtitulo" x="1099" y="164">Registro legado preservado hasta introducir CortePlanificacion</text>

  <g transform="translate(1110 190)">
    <rect class="clase historia" width="415" height="148"/>
    <path class="cabecera-historia" d="M10 0 H405 A10 10 0 0 1 415 10 V49 H0 V10 A10 10 0 0 1 10 0"/>
    <text class="estereotipo" x="16" y="18">«RAÍZ DE AGREGADO LEGADA»</text>
    <text class="nombre" x="16" y="40">Agenda</text>
    <text class="atributo" x="16" y="72">id · nombre · rango</text>
    <text class="atributo" x="16" y="94">estado: BORRADOR | CONFIRMADA | FINALIZADA</text>
    <text class="atributo" x="16" y="116">confirmadaEn / finalizadaEn: Date?</text>
    <text class="atributo" x="16" y="138">controla el ciclo histórico de sus bloques</text>
  </g>

  <g transform="translate(1110 392)">
    <rect class="clase historia" width="415" height="166"/>
    <path class="cabecera-historia" d="M10 0 H405 A10 10 0 0 1 415 10 V49 H0 V10 A10 10 0 0 1 10 0"/>
    <text class="estereotipo" x="16" y="18">«ENTIDAD HISTÓRICA»</text>
    <text class="nombre" x="16" y="40">BloqueTrabajo</text>
    <text class="atributo" x="16" y="72">actividadId · fecha · minutosPlanificados</text>
    <text class="atributo" x="16" y="94">estado: PENDIENTE | COMPLETADO</text>
    <text class="atributo" x="16" y="116">| INCUMPLIDO | EXCUSADO</text>
    <text class="atributo" x="16" y="138">politica efectiva · resueltoEn: Date?</text>
    <text class="atributo" x="16" y="158">inmutable después de confirmar</text>
  </g>

  <g transform="translate(1110 610)">
    <rect class="clase historia" width="415" height="94"/>
    <path class="cabecera-historia" d="M10 0 H405 A10 10 0 0 1 415 10 V42 H0 V10 A10 10 0 0 1 10 0"/>
    <text class="estereotipo" x="16" y="18">«ENTIDAD HISTÓRICA»</text>
    <text class="nombre" x="16" y="35">AjusteCompromiso</text>
    <text class="atributo" x="16" y="64">bloqueId · canjeRecompensaId · tipo</text>
    <text class="atributo" x="16" y="84">aplicadoEn: Date</text>
  </g>

  <path class="composicion" d="M1317 340 V390"/>
  <text class="relacion-etiqueta" x="1332" y="372">contiene</text>
  <text class="multiplicidad" x="1326" y="352">1</text>
  <text class="multiplicidad" x="1326" y="389">0..*</text>
  <path class="relacion" d="M1317 560 V608"/>
  <text class="relacion-etiqueta" x="1332" y="591">registra 0..*</text>

  <rect class="grupo" x="40" y="762" width="1520" height="340"/>
  <text class="grupo-titulo" x="64" y="793">Puntos y recompensas</text>
  <text class="grupo-subtitulo" x="64" y="814">Trazabilidad económica y flexibilidad ganada</text>

  <g transform="translate(72 846)">
    <rect class="clase economia" width="300" height="132"/>
    <path class="cabecera-economia" d="M10 0 H290 A10 10 0 0 1 300 10 V49 H0 V10 A10 10 0 0 1 10 0"/>
    <text class="estereotipo" x="16" y="18">«AGREGADO»</text>
    <text class="nombre" x="16" y="40">BilleteraPuntos</text>
    <text class="atributo" x="16" y="76">saldo: number «derivado»</text>
    <text class="atributo" x="16" y="99">saldo ≥ 0</text>
    <text class="atributo" x="16" y="121">movimientos semánticamente únicos</text>
  </g>

  <g transform="translate(430 846)">
    <rect class="clase economia" width="320" height="132"/>
    <path class="cabecera-economia" d="M10 0 H310 A10 10 0 0 1 320 10 V49 H0 V10 A10 10 0 0 1 10 0"/>
    <text class="estereotipo" x="16" y="18">«ENTIDAD HISTÓRICA»</text>
    <text class="nombre" x="16" y="40">TransaccionPuntos</text>
    <text class="atributo" x="16" y="76">tipo · cantidad · fuenteId</text>
    <text class="atributo" x="16" y="99">descripcion: string</text>
    <text class="atributo" x="16" y="121">ocurridaEn: Date</text>
  </g>

  <g transform="translate(808 846)">
    <rect class="clase economia" width="320" height="132"/>
    <path class="cabecera-economia" d="M10 0 H310 A10 10 0 0 1 320 10 V49 H0 V10 A10 10 0 0 1 10 0"/>
    <text class="estereotipo" x="16" y="18">«DEFINICIÓN»</text>
    <text class="nombre" x="16" y="40">DefinicionRecompensa</text>
    <text class="atributo" x="16" y="76">id · nombre · descripcion</text>
    <text class="atributo" x="16" y="99">costoPuntos: number</text>
    <text class="atributo" x="16" y="121">tipoEfecto: TipoEfectoRecompensa</text>
  </g>

  <g transform="translate(1186 846)">
    <rect class="clase economia" width="340" height="132"/>
    <path class="cabecera-economia" d="M10 0 H330 A10 10 0 0 1 340 10 V49 H0 V10 A10 10 0 0 1 10 0"/>
    <text class="estereotipo" x="16" y="18">«ENTIDAD HISTÓRICA»</text>
    <text class="nombre" x="16" y="40">CanjeRecompensa</text>
    <text class="atributo" x="16" y="76">recompensaId · puntosGastados</text>
    <text class="atributo" x="16" y="99">fechaObjetivo: FechaLocal</text>
    <text class="atributo" x="16" y="121">canjeadoEn: Date</text>
  </g>

  <path class="composicion" d="M374 912 H428"/>
  <text class="relacion-etiqueta" x="380" y="899">deriva saldo de 0..*</text>
  <path class="relacion" d="M1130 912 H1184"/>
  <text class="relacion-etiqueta" x="1128" y="899">materializa</text>
  <path class="relacion" d="M1186 956 V995 H590 V980"/>
  <text class="relacion-etiqueta" x="848" y="991">genera gasto</text>
  <path class="relacion" d="M1356 844 V730 H1318 V706"/>
  <text class="relacion-etiqueta" x="1368" y="756">autoriza ajustes</text>

  <rect class="regla" x="72" y="1012" width="1454" height="64"/>
  <text class="regla-titulo" x="92" y="1038">Regla transversal de eliminación</text>
  <text class="regla-texto" x="92" y="1062">Eliminar un ContextoPlanificacion nombrado traslada o elimina sólo BloquePlanificacion; nunca elimina Agenda, BloqueTrabajo, resoluciones, puntos ni historia confirmada.</text>

  <line x1="60" y1="1137" x2="105" y2="1137" class="composicion"/>
  <text class="leyenda" x="116" y="1142">composición / control de ciclo</text>
  <line x1="350" y1="1137" x2="395" y2="1137" class="herencia"/>
  <text class="leyenda" x="406" y="1142">especialización</text>
  <line x1="590" y1="1137" x2="635" y2="1137" class="relacion"/>
  <text class="leyenda" x="646" y="1142">referencia o efecto</text>
  <text class="leyenda" x="1518" y="1142" text-anchor="end">Estado implementado · julio de 2026</text>
</svg>
