<svg xmlns="http://www.w3.org/2000/svg" width="1800" height="1120" viewBox="0 0 1800 1120" role="img" aria-labelledby="titulo descripcion">
  <title id="titulo">HereToPlan — Arquitectura hexagonal implementada</title>
  <desc id="descripcion">Diagrama de componentes de React, casos de uso, dominio, puertos, adaptadores IndexedDB, servicios del sistema y raíz de composición.</desc>
  <defs>
    <filter id="sombra" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="4" stdDeviation="5" flood-color="#0f172a" flood-opacity="0.12"/>
    </filter>
    <marker id="flecha" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#475569"/>
    </marker>
    <marker id="flecha-verde" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#047857"/>
    </marker>
    <style>
      .fondo { fill: #f8fafc; }
      .titulo { font: 700 30px Inter, Segoe UI, sans-serif; fill: #0f172a; }
      .subtitulo { font: 400 16px Inter, Segoe UI, sans-serif; fill: #475569; }
      .limite { fill: #ffffff; stroke: #94a3b8; stroke-width: 1.5; stroke-dasharray: 8 7; rx: 22; }
      .limite-titulo { font: 700 17px Inter, Segoe UI, sans-serif; fill: #334155; }
      .componente { fill: #ffffff; stroke-width: 2; rx: 12; filter: url(#sombra); }
      .usuario { fill: #1e3a8a; stroke: #1e3a8a; }
      .presentacion { stroke: #2563eb; }
      .aplicacion { stroke: #059669; }
      .dominio { stroke: #15803d; }
      .puerto { stroke: #a16207; }
      .adaptador { stroke: #7c3aed; }
      .datos { stroke: #475569; }
      .composicion { stroke: #0f766e; }
      .cabecera-presentacion { fill: #dbeafe; }
      .cabecera-aplicacion { fill: #d1fae5; }
      .cabecera-dominio { fill: #dcfce7; }
      .cabecera-puerto { fill: #fef3c7; }
      .cabecera-adaptador { fill: #ede9fe; }
      .cabecera-datos { fill: #e2e8f0; }
      .cabecera-composicion { fill: #ccfbf1; }
      .estereotipo { font: 600 11px Inter, Segoe UI, sans-serif; fill: #64748b; letter-spacing: 0.05em; }
      .nombre { font: 700 17px Inter, Segoe UI, sans-serif; fill: #0f172a; }
      .nombre-claro { font: 700 18px Inter, Segoe UI, sans-serif; fill: #ffffff; }
      .detalle { font: 400 13px Inter, Segoe UI, sans-serif; fill: #334155; }
      .detalle-claro { font: 400 13px Inter, Segoe UI, sans-serif; fill: #dbeafe; }
      .codigo { font: 400 12px ui-monospace, SFMono-Regular, Consolas, monospace; fill: #334155; }
      .flujo { fill: none; stroke: #475569; stroke-width: 2; marker-end: url(#flecha); }
      .dependencia { fill: none; stroke: #047857; stroke-width: 2.2; marker-end: url(#flecha-verde); }
      .configura { fill: none; stroke: #0f766e; stroke-width: 1.8; stroke-dasharray: 7 5; marker-end: url(#flecha-verde); }
      .etiqueta { font: 600 12px Inter, Segoe UI, sans-serif; fill: #334155; paint-order: stroke; stroke: #f8fafc; stroke-width: 6px; stroke-linejoin: round; }
      .nota { fill: #f1f5f9; stroke: #cbd5e1; stroke-width: 1.3; rx: 10; }
      .nota-titulo { font: 700 13px Inter, Segoe UI, sans-serif; fill: #0f172a; }
      .nota-texto { font: 400 12.5px Inter, Segoe UI, sans-serif; fill: #475569; }
      .leyenda { font: 400 12px Inter, Segoe UI, sans-serif; fill: #475569; }
    </style>
  </defs>

  <rect class="fondo" width="1800" height="1120"/>
  <text class="titulo" x="54" y="54">HereToPlan — Arquitectura hexagonal implementada</text>
  <text class="subtitulo" x="54" y="82">Las dependencias apuntan al núcleo; React e IndexedDB son adaptadores reemplazables.</text>

  <rect class="limite" x="220" y="112" width="1530" height="900"/>
  <text class="limite-titulo" x="244" y="142">Aplicación web estática · TypeScript + React · ejecución en el navegador</text>

  <g transform="translate(42 430)">
    <rect class="componente usuario" width="150" height="170" rx="18"/>
    <circle cx="75" cy="48" r="25" fill="#ffffff" opacity="0.95"/>
    <path d="M35 124 C40 83 110 83 115 124" fill="none" stroke="#ffffff" stroke-width="13" stroke-linecap="round"/>
    <text class="nombre-claro" x="75" y="150" text-anchor="middle">Usuario</text>
    <text class="detalle-claro" x="75" y="168" text-anchor="middle">planifica y revisa</text>
  </g>

  <g transform="translate(300 188)">
    <rect class="componente composicion" width="400" height="128"/>
    <path class="cabecera-composicion" d="M12 0 H388 A12 12 0 0 1 400 12 V48 H0 V12 A12 12 0 0 1 12 0"/>
    <text class="estereotipo" x="18" y="19">«COMPOSITION ROOT»</text>
    <text class="nombre" x="18" y="40">configurarAplicacion</text>
    <text class="detalle" x="18" y="74">Inicializa Libre y migra metadatos legados.</text>
    <text class="detalle" x="18" y="96">Construye casos de uso y selecciona adaptadores.</text>
    <text class="codigo" x="18" y="117">src/app</text>
  </g>

  <g transform="translate(300 390)">
    <rect class="componente presentacion" width="400" height="230"/>
    <path class="cabecera-presentacion" d="M12 0 H388 A12 12 0 0 1 400 12 V52 H0 V12 A12 12 0 0 1 12 0"/>
    <text class="estereotipo" x="18" y="19">«ADAPTADOR DE ENTRADA»</text>
    <text class="nombre" x="18" y="42">Presentación React</text>
    <text class="detalle" x="18" y="82">• calendario general: día, semana y mes</text>
    <text class="detalle" x="18" y="106">• panel de siete días y lista equivalente</text>
    <text class="detalle" x="18" y="130">• formularios de agenda, actividad y bloque</text>
    <text class="detalle" x="18" y="154">• diálogo accesible de eliminación segura</text>
    <text class="detalle" x="18" y="181">Sólo conoce DTO y puertos de entrada.</text>
    <text class="codigo" x="18" y="212">src/presentacion</text>
  </g>

  <g transform="translate(755 188)">
    <rect class="componente aplicacion" width="440" height="128"/>
    <path class="cabecera-aplicacion" d="M12 0 H428 A12 12 0 0 1 440 12 V48 H0 V12 A12 12 0 0 1 12 0"/>
    <text class="estereotipo" x="18" y="19">«CONTRATO DEL ADAPTADOR»</text>
    <text class="nombre" x="18" y="40">ServiciosCalendario</text>
    <text class="detalle" x="18" y="74">Agrupa capacidades de entrada requeridas por React.</text>
    <text class="detalle" x="18" y="96">Expone sólo ejecutar() y resultados serializables.</text>
    <text class="codigo" x="18" y="117">presentacion/calendario/ServiciosCalendario.ts</text>
  </g>

  <g transform="translate(755 390)">
    <rect class="componente aplicacion" width="440" height="230"/>
    <path class="cabecera-aplicacion" d="M12 0 H428 A12 12 0 0 1 440 12 V52 H0 V12 A12 12 0 0 1 12 0"/>
    <text class="estereotipo" x="18" y="19">«APLICACIÓN · PUERTOS DE ENTRADA»</text>
    <text class="nombre" x="18" y="42">Casos de uso</text>
    <text class="detalle" x="18" y="82">• crear/listar contextos y actividades</text>
    <text class="detalle" x="18" y="106">• asignar, editar y quitar bloques</text>
    <text class="detalle" x="18" y="130">• consultar y proyectar el calendario</text>
    <text class="detalle" x="18" y="154">• consultar impacto y eliminar contexto</text>
    <text class="detalle" x="18" y="181">Orquestan reglas y límites transaccionales.</text>
    <text class="codigo" x="18" y="212">src/aplicacion</text>
  </g>

  <g transform="translate(1250 390)">
    <rect class="componente dominio" width="420" height="230"/>
    <path class="cabecera-dominio" d="M12 0 H408 A12 12 0 0 1 420 12 V52 H0 V12 A12 12 0 0 1 12 0"/>
    <text class="estereotipo" x="18" y="19">«NÚCLEO»</text>
    <text class="nombre" x="18" y="42">Modelo de dominio</text>
    <text class="detalle" x="18" y="82">• actividades, tareas y hábitos</text>
    <text class="detalle" x="18" y="106">• contextos y planificación editable</text>
    <text class="detalle" x="18" y="130">• agendas y compromisos históricos</text>
    <text class="detalle" x="18" y="154">• políticas, puntos y recompensas</text>
    <text class="detalle" x="18" y="181">Sin dependencias de React ni IndexedDB.</text>
    <text class="codigo" x="18" y="212">src/dominio</text>
  </g>

  <g transform="translate(755 690)">
    <rect class="componente puerto" width="440" height="238"/>
    <path class="cabecera-puerto" d="M12 0 H428 A12 12 0 0 1 440 12 V52 H0 V12 A12 12 0 0 1 12 0"/>
    <text class="estereotipo" x="18" y="19">«PUERTOS DE SALIDA»</text>
    <text class="nombre" x="18" y="42">Contratos requeridos</text>
    <text class="detalle" x="18" y="82">RepositorioContextosPlanificacion</text>
    <text class="detalle" x="18" y="106">RepositorioActividades</text>
    <text class="detalle" x="18" y="130">RepositorioBloquesPlanificacion</text>
    <text class="detalle" x="18" y="154">RepositorioAgendas «historia legada»</text>
    <text class="detalle" x="18" y="178">TransaccionEliminacionContextoPlanificacion</text>
    <text class="detalle" x="18" y="202">Reloj · CalendarioLocal · GeneradorIdentificadores</text>
    <text class="codigo" x="18" y="226">src/aplicacion/puertos</text>
  </g>

  <g transform="translate(1250 690)">
    <rect class="componente adaptador" width="420" height="238"/>
    <path class="cabecera-adaptador" d="M12 0 H408 A12 12 0 0 1 420 12 V52 H0 V12 A12 12 0 0 1 12 0"/>
    <text class="estereotipo" x="18" y="19">«ADAPTADORES DE SALIDA»</text>
    <text class="nombre" x="18" y="42">Infraestructura del navegador</text>
    <text class="detalle" x="18" y="82">• repositorios IndexedDB</text>
    <text class="detalle" x="18" y="106">• migrador de contextos legados</text>
    <text class="detalle" x="18" y="130">• transacción atómica de eliminación</text>
    <text class="detalle" x="18" y="154">• reloj del sistema y fecha local</text>
    <text class="detalle" x="18" y="178">• UUID del navegador</text>
    <text class="detalle" x="18" y="202">Implementan contratos; no dictan reglas.</text>
    <text class="codigo" x="18" y="226">src/infraestructura</text>
  </g>

  <g transform="translate(300 690)">
    <rect class="componente datos" width="400" height="238"/>
    <path class="cabecera-datos" d="M12 0 H388 A12 12 0 0 1 400 12 V52 H0 V12 A12 12 0 0 1 12 0"/>
    <text class="estereotipo" x="18" y="19">«ALMACENAMIENTO LOCAL»</text>
    <text class="nombre" x="18" y="42">IndexedDB v4 · here-to-plan</text>
    <text class="detalle" x="18" y="82">contextos-planificacion · ContextoV1</text>
    <text class="detalle" x="18" y="106">actividades · ActividadV1</text>
    <text class="detalle" x="18" y="130">bloques-planificacion · BloqueV1</text>
    <text class="detalle" x="18" y="154">agendas · AgendaV1</text>
    <text class="detalle" x="18" y="184">Datos privados, versionados y rehidratables.</text>
    <text class="detalle" x="18" y="208">Persisten entre recargas del navegador.</text>
  </g>

  <path class="flujo" d="M192 515 H298"/>
  <text class="etiqueta" x="214" y="501">interactúa</text>
  <path class="flujo" d="M700 505 H753"/>
  <text class="etiqueta" x="698" y="490">invoca</text>
  <path class="dependencia" d="M975 318 V388"/>
  <text class="etiqueta" x="990" y="350">agrupa</text>
  <path class="dependencia" d="M1197 505 H1248"/>
  <text class="etiqueta" x="1191" y="490">aplica reglas</text>
  <path class="dependencia" d="M975 622 V688"/>
  <text class="etiqueta" x="990" y="660">requiere</text>
  <path class="dependencia" d="M1248 809 H1197"/>
  <text class="etiqueta" x="1198" y="794">implementa</text>
  <path class="flujo" d="M1248 860 H1215 V946 H500 V930"/>
  <text class="etiqueta" x="817" y="940">lee, escribe y rehidrata</text>

  <path class="configura" d="M500 318 V388"/>
  <path class="configura" d="M700 252 H753"/>
  <path class="configura" d="M500 318 V350 H975 V388"/>
  <path class="configura" d="M500 318 V352 H1460 V388"/>
  <path class="configura" d="M500 318 V350 H1710 V808 H1672"/>
  <text class="etiqueta" x="513" y="342">ensambla</text>

  <rect class="nota" x="300" y="958" width="1370" height="78"/>
  <text class="nota-titulo" x="322" y="985">Límite transaccional implementado</text>
  <text class="nota-texto" x="322" y="1009">La eliminación segura valida una huella y escribe contextos y bloques en una sola transacción IndexedDB; el almacén de agendas sólo se lee para proteger historia confirmada.</text>

  <line x1="270" y1="1072" x2="325" y2="1072" class="flujo"/>
  <text class="leyenda" x="337" y="1077">flujo de ejecución / datos</text>
  <line x1="565" y1="1072" x2="620" y2="1072" class="dependencia"/>
  <text class="leyenda" x="632" y="1077">dependencia hacia un contrato o el núcleo</text>
  <line x1="978" y1="1072" x2="1033" y2="1072" class="configura"/>
  <text class="leyenda" x="1045" y="1077">ensamblaje en la raíz de composición</text>
  <text class="leyenda" x="1730" y="1077" text-anchor="end">Estado implementado · julio de 2026</text>
</svg>
